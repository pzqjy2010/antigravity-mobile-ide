<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Antigravity Mobile IDE</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg-color: #0f172a;
            /* Slate 900 */
            --panel-bg: rgba(30, 41, 59, 0.65);
            /* Slate 800 with opacity */
            --panel-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            /* Blue 500 */
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            /* Slate 50 */
            --text-muted: #94a3b8;
            /* Slate 400 */
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --ai-bubble: rgba(51, 65, 85, 0.5);
            --user-bubble: rgba(59, 130, 246, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1) 0%, transparent 25%);
        }

        /* --- Glassmorphism Utils --- */
        .glass {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
        }



        /* --- Top Navigation --- */
        .top-nav {
            padding: 10px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
            border-bottom: 1px solid var(--panel-border);
        }

        .nav-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .instance-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            flex-shrink: 0;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            flex-shrink: 0;
        }

        .model-badge {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 12px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* Session bar */
        .session-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .new-chat-btn {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
        }

        .new-chat-btn:active {
            opacity: 0.7;
        }

        .session-selector {
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
        }

        .session-selector:active {
            opacity: 0.7;
        }

        /* --- Chat Area --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 0;
            display: flex;
            flex-direction: column;
            gap: 24px;
            min-height: 0;
        }

        .msg {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 90%;
            animation: fadeIn 0.3s ease-out;
        }

        .msg.user {
            align-self: flex-end;
        }

        .msg.ai {
            align-self: flex-start;
            max-width: 95%;
        }

        .bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .msg.user .bubble {
            background: var(--user-bubble);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-bottom-right-radius: 6px;
            color: #eff6ff;
        }

        .msg.ai .bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--panel-border);
            border-bottom-left-radius: 6px;
            border-left: 3px solid var(--primary);
            white-space: normal;
        }

        /* Markdown 渲染样式 */
        .bubble h1,
        .bubble h2,
        .bubble h3,
        .bubble h4 {
            margin: 8px 0 4px;
            font-weight: 600;
        }

        .bubble h1 {
            font-size: 1.3em;
        }

        .bubble h2 {
            font-size: 1.15em;
        }

        .bubble h3 {
            font-size: 1.05em;
        }

        .bubble p {
            margin: 6px 0;
        }

        .bubble ul,
        .bubble ol {
            margin: 6px 0;
            padding-left: 20px;
        }

        .bubble li {
            margin: 2px 0;
        }

        .bubble code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.88em;
        }

        .bubble pre {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .bubble pre code {
            background: none;
            padding: 0;
            font-size: 0.85em;
        }

        .bubble blockquote {
            border-left: 3px solid var(--primary);
            margin: 8px 0;
            padding: 4px 12px;
            color: var(--text-muted);
            font-style: italic;
        }

        .bubble table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
            font-size: 0.9em;
        }

        .bubble th,
        .bubble td {
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px 10px;
            text-align: left;
        }

        .bubble th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
        }

        .bubble strong {
            color: #e2e8f0;
        }

        .bubble a {
            color: var(--primary);
            text-decoration: underline;
        }

        /* HTML5 Details/Summary for Action Tree */
        details.action-tree-container {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 8px 0;
            margin-top: 12px;
        }

        details.action-tree-container summary {
            list-style: none;
            user-select: none;
            outline: none;
            transition: opacity 0.2s;
            padding: 4px 16px;
        }

        details.action-tree-container summary::-webkit-details-marker {
            display: none;
        }

        details.action-tree-container summary:active {
            opacity: 0.7;
        }

        details.action-tree-container[open] summary .dropdown-arrow {
            transform: rotate(90deg);
        }

        .dropdown-arrow {
            display: inline-block;
            transition: transform 0.2s ease-in-out;
            font-size: 10px;
            color: var(--primary);
        }

        /* AI Action Tree */
        .action-tree {
            padding-left: 20px;
            padding-right: 16px;
            margin-top: 8px;
            border-left: 2px solid rgba(255, 255, 255, 0.05);
            margin-left: 10px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .action-node {
            position: relative;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .action-node::before {
            content: '';
            position: absolute;
            left: -22px;
            top: 18px;
            width: 14px;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
        }

        .action-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-card.clickable {
            cursor: pointer;
        }

        .action-card.clickable:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.08);
        }

        .action-icon {
            width: 24px;
            text-align: center;
            font-size: 16px;
        }

        .action-error {
            margin-top: 8px;
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            font-size: 13px;
            display: inline-block;
            cursor: pointer;
        }

        .action-error:active {
            opacity: 0.8;
        }

        /* Badges */
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        .status-badge.on {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .status-badge.off {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .settings-btn.danger {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .settings-btn.danger:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        /* Instance Dropdown */
        .instance-dropdown {
            position: absolute;
            top: 60px;
            left: 20px;
            background: #0f172a;
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 8px 0;
            z-index: 999;
            display: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            min-width: 220px;
            max-height: 50vh;
            overflow-y: auto;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .instance-dropdown.open {
            display: block;
        }

        .instance-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .instance-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .instance-item.active {
            color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        /* --- Floating Bottom Dock --- */
        .bottom-dock {
            flex-shrink: 0;
            align-self: center;
            border-radius: 28px;
            padding: 6px 20px;
            margin-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .dock-item {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            line-height: 1;
            color: var(--text-muted);
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .dock-item.active {
            background: rgba(59, 130, 246, 0.2);
            color: var(--primary);
        }

        .dock-item.active::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 3px;
            border-radius: 2px;
            background: var(--primary);
        }

        .dock-item:active {
            transform: scale(0.9);
        }

        /* --- Input Bar (Floating above dock) --- */
        .input-bar {
            flex-shrink: 0;
            margin: 12px 16px 8px;
            border-radius: 22px;
            padding: 6px 6px 6px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
        }

        .input-bar input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 15px;
            font-family: 'Inter';
            width: 100%;
        }

        .input-bar input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            flex-shrink: 0;
            background: var(--primary);
            color: white;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            box-shadow: 0 0 10px var(--primary-glow);
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading dots */
        .typing {
            display: flex;
            gap: 6px;
            align-items: center;
            height: 24px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            40% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* 截图新版悬浮样式 */
        .glass-pill {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            z-index: 50;
        }
        .glass-pill::-webkit-scrollbar { display: none; }
        .glass-pill { -ms-overflow-style: none; scrollbar-width: none; }

        .segment-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .segment-btn:hover {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .segment-btn.active {
            color: white;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        /* Drawers (File, Terminal, Settings) */
        .drawer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            top: 120px;
            background: #0f172a;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 30;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.6);
            border-top: 1px solid var(--panel-border);
        }

        .drawer.open {
            transform: translateY(0);
        }

        .drawer-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 16px;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            padding: 4px;
            cursor: pointer;
        }

        .drawer-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        /* Fullscreen Modal */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0f172a;
            z-index: 40;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .modal.open {
            transform: translateY(0);
        }

        /* Image Viewer Overlay */
        #imgViewerOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9999;
            background: #000;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #imgViewerOverlay.active { display: flex; align-items: center; justify-content: center; }
        #imgViewerOverlay img {
            max-width: none; max-height: none;
            transform-origin: center center;
            will-change: transform;
        }
        #imgViewerClose {
            position: fixed; top: 16px; right: 16px; z-index: 10000;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        #imgViewerInfo {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10000;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 6px 16px; color: rgba(255,255,255,0.7); font-size: 12px;
            font-family: 'JetBrains Mono', monospace; pointer-events: none;
        }

        /* File Tree */
        .file-tree {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .tree-item {
            padding: 6px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tree-item:active {
            opacity: 0.7;
        }

        .tree-dir>.tree-children {
            padding-left: 16px;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tree-dir>.tree-children.collapsed {
            display: none;
        }

        .tree-toggle {
            font-size: 10px;
            width: 14px;
            text-align: center;
            color: var(--text-muted);
            transition: transform 0.15s;
        }

        .tree-toggle.open {
            transform: rotate(90deg);
        }

        /* Terminal */
        .term-output {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            background: #000;
            color: #4ade80;
            padding: 12px;
            border-radius: 8px;
            min-height: 200px;
            max-height: calc(100vh - 300px);
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
        }

        .term-input-bar {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            align-items: center;
        }

        .term-input-bar input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 10px 14px;
            color: #4ade80;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .term-input-bar button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .term-input-bar button:active {
            opacity: 0.8;
        }

        /* Settings */
        .settings-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .settings-section h3 {
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
        }

        .settings-row .label {
            color: var(--text-muted);
        }

        .quota-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 4px;
        }

        .quota-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .settings-btn {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
            text-align: center;
        }

        .settings-btn:active {
            opacity: 0.7;
        }

        /* Model Dropdown */
        .model-dropdown {
            position: absolute;
            top: 60px;
            right: 16px;
            background: #0f172a;
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 8px 0;
            z-index: 999;
            display: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            min-width: 200px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .model-dropdown.open {
            display: block;
        }

        /* Code viewer */
        .code-viewer {
            padding: 16px;
            overflow: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .code-viewer pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .code-line {
            display: flex;
        }

        .code-line-num {
            color: var(--text-muted);
            min-width: 40px;
            text-align: right;
            padding-right: 12px;
            user-select: none;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <!-- 顶栏 -->
    <header class="top-nav glass" id="topNav">
        <div class="nav-row">
            <div class="instance-selector" id="instanceSelector" onclick="toggleInstanceDropdown()">
                <span class="status-dot"></span>
                <span id="instanceName"
                    style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:'JetBrains Mono',monospace; max-width:160px;">加载中…</span>
                <span style="font-size:8px; color:var(--text-muted)">▼</span>
            </div>
            <div class="model-badge" id="modelSelector"
                style="display:flex; align-items:center; gap:4px; cursor:pointer;">
                <span id="modelName">加载中…</span> <span style="font-size:8px; opacity:0.7;">▼</span>
            </div>
        </div>
        <div class="nav-row session-bar">
            <span class="new-chat-btn" id="newChatBtn" onclick="newConversation()">＋ 新对话</span>
            <span class="session-selector" id="sessionSelector" onclick="toggleSessionDropdown()">
                <span id="sessionLabel">加载中…</span> <span style="font-size:8px;">▼</span>
            </span>
        </div>
    </header>

    <!-- Instance Dropdown -->
    <div class="instance-dropdown" id="instanceDropdown"></div>
    <!-- Session Dropdown -->
    <div class="instance-dropdown" id="sessionDropdown" style="left:auto; right:16px;"></div>
    <!-- Model Dropdown -->
    <div class="model-dropdown" id="modelDropdown"></div>

    <!-- 聊天区 -->
    <main class="chat-container" id="chatContainer">
        <!-- 空状态欢迎引导 -->
        <div id="emptyState"
            style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:12px; opacity:0.4;">
            <div style="font-size:48px;">⏳</div>
            <div style="font-size:16px; font-weight:600;">正在连接…</div>
            <div style="font-size:13px; color:var(--text-muted); text-align:center; max-width:240px;">正在加载工作区和会话数据</div>
        </div>
    </main>

    <!-- 输入框 -->
    <div class="input-bar glass">
        <input type="text" id="chatInput" placeholder="输入你想让 AI 做的事情...">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>

    <!-- 底部 Dock -->
    <div class="bottom-dock glass" id="bottomDock">
        <div class="dock-item" data-drawer="file" title="文件树">📁</div>
        <div class="dock-item" data-drawer="screen" title="屏幕截图">📷</div>
        <div class="dock-item" data-drawer="term" title="终端">>_</div>
        <div class="dock-item" data-drawer="settings" title="设置">⚙️</div>
    </div>

    <!-- 抽屉结构预留 -->
    <div id="drawer-file" class="drawer">
        <div class="drawer-header">
            <span>📁 工作区文件</span>
            <div style="display:flex; gap:8px; align-items:center;">
                <button class="close-btn" onclick="fetchFileTree()" title="刷新">🔄</button>
                <button class="close-btn" onclick="closeDrawer('file')">✕</button>
            </div>
        </div>
        <div class="drawer-content" id="fileTreeContainer">
            <div style="color:var(--text-muted)">点击 📁 加载文件树</div>
        </div>
    </div>
    <div id="drawer-term" class="drawer">
        <div class="drawer-header">
            <span>>_ 远程终端</span>
            <button class="close-btn" onclick="closeDrawer('term')">✕</button>
        </div>
        <div class="drawer-content" style="display:flex; flex-direction:column;">
            <div id="termCwd"
                style="font-size:11px; color:var(--text-muted); margin-bottom:8px; font-family:'JetBrains Mono',monospace;">
            </div>
            <div class="term-output" id="termOutput">欢迎使用远程终端 🖥️
                输入命令并回车执行
            </div>
            <div class="term-input-bar">
                <span style="color:#4ade80; font-weight:bold;">$</span>
                <input type="text" id="termInput" placeholder="输入命令..."
                    onkeypress="if(event.key==='Enter') execCommand()">
                <button onclick="execCommand()">执行</button>
            </div>
        </div>
    </div>
    <div id="drawer-settings" class="drawer">
        <div class="drawer-header">
            <span>⚙️ 设置</span>
            <button class="close-btn" onclick="closeDrawer('settings')">✕</button>
        </div>
        <div class="drawer-content" id="settingsContent"></div>
    </div>

    <!-- 全屏模态框 (代码查看、截图查看) -->
    <div id="modal-viewer" class="modal">
        <div class="drawer-header">
            <span id="modalTitle">Viewer</span>
            <div style="display:flex; gap:8px; align-items:center;">
                <div id="modalActions"></div>
                <button class="close-btn" onclick="closeModal()">✕ 关闭</button>
            </div>
        </div>
        <div class="drawer-content" id="modalContent" style="padding: 0;"></div>
    </div>

    <script>
        // --- State Management ---
        const state = {
            activePort: null,
            activeConvId: null,
            instances: [],
            models: [],
            conversations: [],
            pollingInterval: null
        };

        const BASE_URL = '';
        const _LS_KEY = 'ag_mobile_state';

        function _saveState() {
            try {
                localStorage.setItem(_LS_KEY, JSON.stringify({
                    port: state.activePort,
                    convId: state.activeConvId,
                    model: state.activeModel,
                    modelLabel: document.getElementById('modelName')?.innerText || '',
                }));
            } catch (e) { }
        }
        function _restoreSaved() {
            try  {
                return JSON.parse(localStorage.getItem(_LS_KEY) || '{}');
            } catch (e) { return {}; }
        }

        // --- Stale-While-Revalidate 缓存 ---
        const _CACHE_TTL = 5 * 60 * 1000; // 5分钟
        function _cacheSet(key, data) {
            try { localStorage.setItem('ag_cache_' + key, JSON.stringify({ t: Date.now(), d: data })); } catch (e) { }
        }
        function _cacheGet(key) {
            try {
                const raw = localStorage.getItem('ag_cache_' + key);
                if (!raw) return null;
                const obj = JSON.parse(raw);
                 return { data: obj.d, fresh: (Date.now() - obj.t) < _CACHE_TTL };
            } catch (e) { return null; }
        }

        // --- 会话管理 (后端 API 驱动) ---
        function updateSessionLabel() {
            const convs = state.conversations || [];
            const cur = convs.find(c => c.id === state.activeConvId);
            if (cur) {
                // 截取标题前15字符
                const title = cur.summary.length > 15 ? cur.summary.slice(0, 15) + '…' : cur.summary;
                document.getElementById('sessionLabel').innerText = title;
            } else {
                document.getElementById('sessionLabel').innerText = '新对话';
            }
        }

        function newConversation() {
            state.activeConvId = null;
            chatContainer.innerHTML = '';
            updateSessionLabel();
        }

        async function fetchConversations() {
            if (!state.activePort) return;
            try {
                const res = await fetch(`${BASE_URL}/v1/instances/${state.activePort}/conversations`);
                const data = await res.json();
                state.conversations = data.conversations || [];
                _cacheSet('convs_' + state.activePort, state.conversations);
            } catch (e) {
                console.error('Error fetching conversations:', e);
                state.conversations = [];
            }
        }

        function toggleSessionDropdown() {
            const dd = document.getElementById('sessionDropdown');
            if (dd.classList.contains('open')) { dd.classList.remove('open'); return; }

            // 先用缓存秒开
            const cached = _cacheGet('convs_' + state.activePort);
            if (cached && cached.data && cached.data.length > 0) {
                state.conversations = cached.data;
                renderSessionDropdown();
                dd.classList.add('open');
                // 后台静默刷新
                if (!cached.fresh) {
                    fetchConversations().then(() => renderSessionDropdown());
                }
            } else {
                dd.innerHTML = '<div style="padding:12px 16px; color:var(--text-muted); font-size:13px;">加载中...</div>';
                dd.classList.add('open');
                fetchConversations().then(() => renderSessionDropdown());
            }
        }

        function renderSessionDropdown() {
            const dd = document.getElementById('sessionDropdown');
            const convs = state.conversations || [];
            if (convs.length === 0) {
                dd.innerHTML = '<div style="padding:12px 16px; color:var(--text-muted); font-size:13px;">暂无历史会话</div>';
                return;
            }
            let html = '';
            convs.forEach((c) => {
                const isActive = c.id === state.activeConvId;
                const title = c.summary || '未命名会话';
                // 格式化时间：取 last_modified_time 的日期部分
                let timeStr = '';
                if (c.last_modified_time) {
                      const d = new  Date(c.last_modified_time);
                     timeStr = `${(d.getMonth() + 1).toString().padStart(2, '0')}-${d.getDate().toString().padStart(2, '0')} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                }
                html += `<div class="instance-item ${isActive ? 'active' : ''}" onclick="switchSession('${c.id}')" style="flex-direction:column; align-items:flex-start; gap:2px;">
                    <span style="font-weight:600; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px;">${title}</span>
                    <span style="font-size:11px; opacity:0.4;">${timeStr} · ${c.step_count}步</span>
                </div>`;
            });
            dd.innerHTML = html;
        }

        async function switchSession(convId) {
            document.getElementById('sessionDropdown').classList.remove('open');
            if (convId === state.activeConvId) return;
            state.activeConvId = convId;
            chatContainer.innerHTML = '<div style="padding:32px; text-align:center; color:var(--text-muted);">加载中...</div>';
            updateSessionLabel();
            _saveState();
            await _loadChatHistory(convId);
        }

        async function _loadChatHistory(convId) {
            try {
                // 优先从后端缓存加载完整对话
                const res = await fetch(`${BASE_URL}/v1/chat/history/${convId}`);
                const data = await res.json();
                if (data.found && data.messages && data.messages.length > 0) {
                    chatContainer.innerHTML = '';
                    data.messages.forEach(m => {
                        const w = appendMsg(m.role || 'ai', '');
                        const bubble = w.querySelector('.bubble');
                        if (m.role === 'user') {
                            bubble.textContent = m.content || '';
                        } else {
                            bubble.innerHTML = m.content || '';
                         }
                    });
                    return;
                }
            } catch (e) {
                console.warn('History load failed:', e);
            }

            // 无缓存 → 加载足迹时间线
            await _loadTimeline(convId);
        }

        async function _loadTimeline(convId) {
            try {
                const res = await fetch(`${BASE_URL}/v1/chat/history/${convId}/timeline?port=${state.activePort}`);
                const data = await res.json();
                const items = data.timeline || [];
                if (items.length === 0) {
                    _resetChatArea();
                    return;
                }
                chatContainer.innerHTML = '';
                const header = document.createElement('div');
                header.style.cssText = 'padding:12px 16px; font-size:12px; color:var(--text-muted); border-bottom:1px solid rgba(255,255,255,0.06);';
                header.innerHTML = `📋 操作足迹 (${data.total_steps} 步) · <span style="opacity:0.5;">完整文本未缓存</span>`;
                chatContainer.appendChild(header);

                items.forEach(item => {
                    const div = document.createElement('div');
                    div.style.cssText = 'padding:6px 16px; font-size:13px; display:flex; gap:8px; align-items:flex-start; border-bottom:1px solid rgba(255,255,255,0.03);';
                    let timeStr = '';
                    if (item.time) {
                         const d = new Date(item.time);
                         timeStr = `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')}`;
                    }
                    div.innerHTML = `
                        <span style="opacity:0.3; font-size:11px; min-width:55px; font-family:monospace;">${timeStr}</span>
                        <span>${item.icon}</span>
                        <span style="font-weight:500;">${item.label}</span>
                        <span style="color:var(--text-muted); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:160px;" title="${item.detail || ''}">${item.detail || ''}</span>
                    `;
                    chatContainer.appendChild(div) ;
                });
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } catch (e) {
                console.error('Timeline load error:', e);
                _resetChatArea();
            }
        }

        function _resetChatArea() {
            chatContainer.innerHTML = `
                <div id="emptyState" style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:12px; opacity:0.4;">
                    <div style="font-size:48px;">🚀</div>
                    <div style="font-size:16px; font-weight:600;">Antigravity Mobile IDE</div>
                    <div style="font-size:13px; color:var(--text-muted); text-align:center; max-width:240px;">输入消息开始与 AI 对话，或切换到其他面板 浏览工作区</div>
                </div>`;
        }

        document.addEventListener('click', e => {
            if (!e.target.closest('#instanceSelector') && !e.target.closest('#instanceDropdown')) {
                 document.getElementById('instanceDropdown').classList.remove('open');
            }
            if (!e.target.closest('#sessionSelector') && !e.target.closest('#sessionDropdown')) { 
                document.getElementById('sessionDropdown').classList.remove('open');
            }
            if (!e.target.closest('#modelSelector') && !e.target.closest('#modelDropdown')) {
                document.getElementById('modelDropdown').classList.remove('open');
            }
        });

        // --- UI Utils ---
        const chatContainer = document.getElementById('chatContainer');
        const inputStr = document.getElementById('chatInput');

        function toggleDrawer(name) {
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
            const target = document.getElementById('drawer-' + name);
            if (target) {
                target.classList.add('open');
                // 懒加载
                if (name === 'file') fetchFileTree();
                if (name === 'settings') renderSettings();
            }
        }
        function closeDrawer(name) {
            document.getElementById('drawer-' + name).classList.remove('open');
            const dockBtn = document.querySelector(`.dock-item[data-drawer="${name}"]`);
            if (dockBtn) dockBtn.classList.remove('active');
        }
        function closeModal() {
            document.getElementById('modal-viewer').classList.remove('open');
            document.getElementById('modalActions').innerHTML = '';
        }

         document.querySelectorAll('.dock-item').forEach(item => {
            item.addEventListener('click', function () {
                const isActive = this.classList.contains('active');
                document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));

                if (isActive) {
                    document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
                } else {
                    this.classList.add('active');
                    const drawerName = this.getAttribute('data-drawer');
                    if (drawerName === 'screen') {
                        this.classList.remove('active');
                        showScreenshot();
                    } else {
                        toggleDrawer(drawerName);
                    }
                }
            });
        });

        function appendMsg(role, text) {
            const es = document.getElementById('emptyState');
            if (es) es.remove();
            const wrapper = document.createElement('div');
            wrapper.className = `msg ${role}`;
            wrapper.innerHTML = `<div class="bubble">${text}</div>`;
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return wrapper;
        }

        // --- Init Logic ---
        function toggleInstanceDropdown() {
            const dd = document.getElementById('instanceDropdown');
            if (dd.classList.contains('open')) { dd.classList.remove('open'); return; }
            if (!state.instances || state.instances.length === 0) {
                dd.innerHTML = '<div style="padding:12px 16px; color:var(--text-muted); font-size:13px;">加载中...</div>';
                dd.classList.add('open');
                fetchInstances().then(() => {
                    if (state.instances && state.instances.length > 0) _renderInstanceDropdown(dd);
                    else dd.innerHTML = '<div style="padding:12px 16px; color:var(--text-muted); font-size:13px;">暂无实例</div>';
                });
                return;
            }
            _renderInstanceDropdown(dd);
            dd.classList.add('open');
        }
        function _renderInstanceDropdown(dd) {
            let html = '';
            state.instances.forEach(i => {
                const name = i.display_name || i.workspace;
                const isActive = (i.port === state.activePort);
                const dotStyle = isActive ? 'background:var(--success); box-shadow:0 0 8px var(--success);' : 'background:var(--text-muted); box-shadow:none;';
                html += `<div class="instance-item ${isActive ? 'active' : ''}" onclick="switchInstance(${i.port})">
                    <span class="status-dot" style="${dotStyle}"></span>
                    <span style="font-weight:600;">${name}</span>
                    <span style="font-size:10px; opacity:0.4; margin-left:auto;">:${i.port}</span>
                </div>`;
            });
            dd.innerHTML = html;
        }

        async function switchInstance(port) {
            document.getElementById('instanceDropdown').classList.remove('open');
            if (port === state.activePort) return;
            state.activePort = port;
            const t = state.instances.find(i => i.port === port);
            if (t) document.getElementById('instanceName').innerText = t.display_name || t.workspace;
            state.activeConvId = null;
            _resetChatArea();
            updateSessionLabel();
            _saveState();
            await fetchStatus();
            await fetchModels();
        }

        async function fetchInstances() {
            try {
                const res = await fetch(`${BASE_URL}/v1/instances`);
                const data = await res.json();
                state.instances = data.instances || [];
                if (state.instances.length > 0) {
                    const saved = _restoreSaved();
                    let target = state.instances[0];
                    // 优先恢复上次选择的端口
                    if (saved.port) {
                        const savedInst = state.instances.find(i => i.port === saved.port);
                        if (savedInst) target = savedInst;
                    } else {
                        const target5490 = state.instances.find(i => i.port === 5490);
                        if (target5490) target = target5490;
                    }
                    state.activePort = target.port;
                    // 恢复上次的对话和模型
                    if (saved.convId && saved.port === target.port) {
                        state.activeConvId = saved.convId;
                    }
                    if (saved.model) {
                        state.activeModel = saved.model;
                        if (saved.modelLabel) document.getElementById('modelName').innerText = saved.modelLabel;
                    }
                    document.getElementById('instanceName').innerText = target.display_name || target.workspace;
                    // 先从缓存恢复会话列表，确保标题正确显示
                    const cachedConvs = _cacheGet('convs_' + target.port);
                    if (cachedConvs && cachedConvs.data) state.conversations = cachedConvs.data;
                    updateSessionLabel();
                    fetchStatus();
                    fetchModels();
                    // 如果恢复了对话，尝试加载历史
                    if (state.activeConvId) {
                        _loadChatHistory(state.activeConvId);
                    } else {
                         _resetChatArea();
                    }
                } else {
                    document.getElementById('instanceName').innerText = "无工作区";
                    _resetChatArea();
                }
            } catch (e) {
                console.error(e);
                document.getElementById('instanceName').innerText = "离线";
            }
        }

        async function fetchStatus() {
            if (!state.activePort) return;
            const cached = _cacheGet('status_' + state.activePort);
            if (cached) {
                _applyUserStatus(cached.data);
                if (cached.fresh) return;
            }
            try {
                const res = await fetch(`${BASE_URL}/v1/ls/user-status?port=${state.activePort}`);
                const data = await res.json();
                _cacheSet('status_' + state.activePort, data);
                _applyUserStatus(data);
            } catch (e) { console.error('Error fetching status:', e); }
        }
        function _applyUserStatus(data) {
            if (data.userStatus) {
                const u = data.userStatus;
                const name = u.name ? u.name.split(' ')[0] : 'User';
                let plan = 'Free';
                if (u.userTier) plan = u.userTier.name || plan;
                else if (u.planStatus && u.planStatus.planInfo) {
                    const pn = u.planStatus.planInfo.planName || '';
                    if (pn.includes('Ultra')) plan = 'Ultra';
                    else if (pn.includes('Pro') || pn.includes('Cloud')) plan = 'Pro';
                    else plan = pn || 'Free';
                }
                state.userName = name;
                state.userPlan = plan;
            }
        }

        async function fetchModels() {
            if (!state.activePort) return;
            const cached = _cacheGet('models_' + state.activePort);
            if (cached) {
                _applyModelsData(cached.data);
                if (cached.fresh) return;
            }
            try {
                const res = await fetch(`${BASE_URL}/v1/ls/models?port=${state.activePort}`);
                const data = await res.json();
                _cacheSet('models_' + state.activePort, data);
                _applyModelsData(data);
            } catch (e) { console.error('Error fetching models:', e); }
        }
        function _applyModelsData(data) {
            let cur = "Unknown";
            let curLabel = "Unknown";
            if (data.defaultOverrideModelConfig && data.defaultOverrideModelConfig.modelOrAlias) {
                cur = data.defaultOverrideModelConfig.modelOrAlias.model;
            }
            const vendorOrder = ['openai', 'claude', 'gemini'];
            function getVendor(str) {
                const s = str.toLowerCase();
                if (s.includes('gemini') || s.includes('flash')) return 'gemini';
                if (s.includes('claude') || s.includes('sonnet') || s.includes('opus')) return 'claude';
                if (s.includes('gpt') || s.includes('oss')) return 'openai';
                return 'other';
            }
            const configs = data.clientModelConfigs || data.models || [];
            const parsed = configs.map(m => {
                const modelId = (m.modelOrAlias && m.modelOrAlias.model) ? m.modelOrAlias.model : m.model;
                const label = m.label || modelId;
                const vendor = getVendor(label);
                if (modelId === cur) curLabel = label;
                let quota = m.quotaInfo?.remainingFraction;
                return { model: modelId, label, vendor, quota };
            });
            state.modelsData = parsed;
            if (!state.activeModel) {
                state.activeModel = cur;
                const el = document.getElementById('modelName');
                if (el) el.innerText = curLabel;
            }
        }

        // --- 截图查看器 ---
        let _currentScreenMode = 'full'; 
        let _monitorCountCache = 0;

        function _renderSegments() {
            const seg = document.getElementById('screenSegments');
            if(!seg) return;
            const c = _currentScreenMode;
            let html = `
                <button class="segment-btn ${c==='window'?'active':''}" onclick="showScreenshot('window')" title="精确截取当前活跃项目窗口">🪟 窗口</button>
                <button class="segment-btn ${c==='full'?'active':''}" onclick="showScreenshot('full')" title="截取并最大化项目所在物理屏">🖥️ 全屏</button>
                <div style="width:1px; height:20px; background:rgba(255,255,255,0.1); margin:0 4px; flex-shrink:0;"></div>
                <button class="segment-btn ${c==='all'?'active':''}" onclick="showScreenshot('all')" title="截取所有显示器全景">🌐 全图</button>
            `;
            const mCount = _monitorCountCache;
            for(let i=0; i<mCount; i++) {
                const modeStr = 'screen_' + i;
                html += `<button class="segment-btn ${c===modeStr?'active':''}" onclick="showScreenshot('${modeStr}')">🖥️ 屏${i+1}</button>`;
            }
            seg.innerHTML = html;
        }

        async function focusSpecificWindow(hwnd, btnNode) {
            try {
                btnNode.innerText = '...';

        async function fetchFileTree() {
            if (!state.activePort) return;
            const container = document.getElementById('fileTreeContainer');
            container.innerHTML = '<div style="color:var(--text-muted)">加载中...</div>';
            try {
                const res = await fetch(`${BASE_URL}/v1/workspace/files?port=${state.activePort}`);
                const data = await res.json();
                container.innerHTML = '<div class="file-tree"></div>';
                const tree = container.querySelector('.file-tree');
                renderTree(tree, data.tree || []);
            } catch (e) {
                container.innerHTML = `<div style="color:var(--danger)">加载失败: ${e.message}</div>`;
            }
        }
        function renderTree(parent, items) {
            items.forEach(item => {
                if (item.type === 'dir') {
                    const div = document.createElement('div');
                    div.className = 'tree-dir';
                    div.innerHTML = `<div class="tree-item"><span class="tree-toggle open">▶</span> 📁 ${item.name}</div>
                                     <div class="tree-children"></div>`;
                    const toggle = div.querySelector('.tree-item');
                    const children = div.querySelector('.tree-children');
                    toggle.addEventListener('click', () => {
                        children.classList.toggle('collapsed');
                        div.querySelector('.tree-toggle').classList.toggle('open');
                    });
                    if (item.children) renderTree(children, item.children);
                    parent.appendChild(div);
                } else {
                    const div = document.createElement('div');
                    div.className = 'tree-item';
                    const sizeKB = item.size > 1024 ? `${(item.size / 1024).toFixed(1)}KB` : `${item.size}B`;
                    div.innerHTML = `<span style="width:14px;"></span> 📄 <span style="flex:1;">${item.name}</span> <span style="font-size:10px; opacity:0.3;">${sizeKB}</span>`;
                    div.addEventListener('click', () => openFile(item.path, item.name));
                    parent.appendChild(div);
                }
            });
        }
        async function openFile(path, name) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalActions').innerHTML = '';
            document.getElementById('modalContent').innerHTML = '<div style="color:white; padding:20px;">加载中...</div>';
            document.getElementById('modal-viewer').classList.add('open');
            try {
                const res = await fetch(`${BASE_URL}/v1/workspace/file?port=${state.activePort}&path=${encodeURIComponent(path)}`);
                const data = await res.json();
                if (data.error) throw new Error(data.detail || data.error);
                const lines = data.content.split('\n');
                let html = '<div class="code-viewer"><pre>';
                lines.forEach((line, i) => {
                    const escaped = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    html += `<div class="code-line"> <span class="code-line-num">${i + 1}</span><span>${escaped}</span></div>`;
                });
                html += '</pre></div>';
                document.getElementById('modalContent').innerHTML = html;
            } catch (e) {
                document.getElementById('modalContent').innerHTML = `<div style="color:var(--danger); padding:20px;">无法打开: ${e.message}</div>`;
            }
        }

        async function execCommand() {
            const input = document.getElementById('termInput');
            const cmd = input.value.trim();
            if (!cmd) return;
            input.value = '';
            const output = document.getElementById('termOutput');
            output.textContent += `\n$ ${cmd}\n执行中...\n`;
            output.scrollTop = output.scrollHeight;
            try {
                const res = await fetch(`${BASE_URL}/v1/system/exec`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd, port: state.activePort })
                });
                const data = await res.json();
                output.textContent = output.textContent.replace('执行中...\n', '');
                if (data.stdout) output.textContent += data.stdout;
                if (data.stderr) output.textContent += data.stderr;
                if (data.cwd) document.getElementById('termCwd').textContent = `cwd: ${data.cwd}`;
            } catch (e) {
                output.textContent = output.textContent.replace('执行中...\n', '');
                output.textContent += `错误: ${e.message}\n`;
            }
            output.scrollTop = output.scrollHeight;
        }

            } catch (e) { alert('聚焦失败'); }
        }

        async function fetchProcesses(forceRefresh = false) {
            try {
                const url = `${BASE_URL}/v1/system/processes?main_only=true` + (forceRefresh ? "&force_refresh=true" : "");
                const res = await fetch(url);
                const data = await res.json();
                let totalMem = 0;
                let procHtml = '';
                (data.processes || []).forEach(p => { 
                    totalMem += (p.memory_mb || 0); 
                    
                    let winHtml = '';
                    if (p.windows && p.windows.length > 0) {
                         p.windows.forEach(w => {
                            winHtml += `<div style="padding-left:12px; margin-top:4px; font-size:11px; color:var(--text-muted); display:flex; gap:8px; align-items:center;">
                                <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">🖥️ ${w.title}</span>
                                <button class="settings-btn" style="width:aut o; padding:2px 8px; font-size:10px ;" onclick="focusWindow(${w.hwnd})">唤醒</button>
                            </div>`;
                        });
                    }
                    procHtml += `<div style="margin-top:8px; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.05);">
                        ings-row">
                             <span class="label" style="color:var(--text-muted);">${p.name} <span style=">[PID: ${p.pid}]</s pan></span>
                            <div style="display:flex; gap:8px; align-items:center;">
                                <span>${p.memory_mb} MB</span>
                                <button class="settings-btn danger" style="padding:2px 8px; font-size:10px; width: auto;" onclick="killProcess(${p.pid})">终止</button>
                            </div>
                        </div>
                        ${winHtml}
                    </div>`;
                });

                const html = `
                    <div class="settings-row">
                        <span class="label">主进程数</span>
                        <span>${data.count} 个</span>
                    </div>
                    <div class="settings-row" style="margin-top:8px;">
                        <span class="label">总内存估算</span>
                        <span>${Math.round(totalMem)} MB</span>
                    </div>
                    <div style="max-height: 200px; overflow-y: auto; margin-top:12px; margin-bottom:12px; padding-right:4px;">
                        ${procHtml}
                    </div>
                `;
                document.getElementById('processContent').innerHTML = html;
            } catch (e) { console.error('processes api error', e); }
        }

        async function killProcess(pid) {
            if (!confirm(`确认要强制终止进程  PID: ${pid} 吗？此操作不可逆！`)) return;
             try {
                await fetch(`${BASE_URL}/v1/system/processes/${pid}/kill`, { method: 'POST' });
                fetchProcesses(true);
            } catch(e) { alert('终止失败'); }
        }

        // --- 模型切换下拉 ---
        document.getElementById('modelSelector').addEventListener('click', async function () {
            const dd = document.getElementById('modelDropdown');
            if (dd.classList.contains('open')) { dd.classList.remove('open'); return; }
            let models = state.modelsData || [];
            if (models.length === 0) {
                dd.innerHTML = '<div style="padding:12px 16px; color:var(--text-muted); font-size:13px;">加载中...</div>';
                dd.classList.add('open');
                await fetchModels();
                models = state.modelsData || [];
                if (models.length === 0) {
                    dd.innerHTML = '<div style="padding:12px 16px; color:var(--text-muted); font-size:13px;">无可用模型</div>';
        return;
                }
            }
            {
                let html = '';
                let lastVendor = '';
                const vendorLabels = { gemini: 'Google Gemini', claude: 'Anthropic Claude', gpt: 'OpenAI GPT', other: '其他' };
                models.forEach(m => {
                    if (m.vendor && m.vendor !== lastVendor) {
                        html += `<div style="padding:6px 16px 4px; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); opacity:0.6; border-top:${lastVendor ? '1px solid rgba(255,255,255,0.06)' : 'none'}; margin-top:${lastVendor ? '4px' : '0'} ;">${vendorLabels[m.vendor] || m.vendor}</div>`;
                         lastVendor = m.vendor;
                    }
                     const isActive = m.model === state.activeModel;
                     const badgeHtml = m.badge ? `<span style="margin-left:8px; font-size:9px; background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:10px; opacity:0.8;">${m.badge}</span>` : '';
                     html += `<div class="instance-item ${isActive ? 'active' : ''}" onclick="selectModel('${m.model}', '${m.label}')">
                        <span style="font-weight:${isActive ? 600 : 400};">${m.label}</span>${badgeHtml}
                    </div>`;
                });
                dd.innerHTML = html;
             }
            dd.classList.add('open');
        });
        function selectModel(model, label) {
            document.getElementById('modelDropdown').classList.remove('open');
            state.activeModel = model;
            document.getElementById('modelName').innerText = label;
            _saveState();
        }

        // --- Chat Logic ---
        let _chatBusy = false;
        async function sendMessage() {
            if (_chatBusy) { cancelCascade(); return; }
            const val = inputStr.value.trim();
            if (!val) return;
            inputStr.value = '';
            _setChatBusy(true);

            appendMsg('user', val);
            const aiWrapper = appendMsg('ai', '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>');

            try {
                const res = await fetch(`${BASE_URL}/v1/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: val,
                        conv_id: state.activeConvId,
                        port: state.activePort,
                        model: state.activeModel || undefined
                    })
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                 const data = await res.json();

                if (data.conv_id) {
                    state.activeConvId = data.conv_id;
                    updateSessionLabel();
                }
                renderAiResponse(aiWrapper, data);
                // 归档到后端（跨设备一致性）
                _archiveCurrentChat();
            } catch (e) {
                console.error(e);
                aiWrapper.querySelector('.bubble').innerHTML = `<span style="color:var(--danger)">❌ 请求失败: ${e.message}</span>`;
            }
            _setChatBusy(false);
        }

        function _archiveCurrentChat() {
            if (!state.activeConvId) return;
            const bubbles = chatContainer.querySelectorAll('.msg');
            if (!bubbles.length) return;
            const messages = [];
            bubbles.forEach(wrapper => {
                const role = wrapper.classList.contains('user') ? 'user' : 'ai';
                const bubble = wrapper.querySelector('.bubble');
                if (!bubble) return;
                messages.push({
                    role: role,
                    content: role === 'user' ? bubble.textContent : bubble.innerHTML,
                    timestamp: new Date().toISOString()
                });
            });
            // 异步归档，不阻塞 UI
            fetch(`${BASE_URL}/v1/chat/history/${state.activeConvId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cascade_id: state.activeConvId, messages, port: state.activePort })
            }).catch(e => console.warn('Archive failed:', e));
        }

        function _setChatBusy(busy) {
            _chatBusy = busy;
            const btn = document.getElementById('sendBtn');
            if (busy) {
                btn.innerText = '🛑';
                btn.style.background = 'var(--danger)';
                btn.title = '停止 AI';
            } else {
                btn.innerText = '➤';
                btn.style.background = 'var(--primary)';
                btn.title = '发送';
            }
        }

        function renderAiResponse(wrapper, data) {
            const bubble = wrapper.querySelector('.bubble');
            if (data.error) {
                bubble.innerHTML = `<span style="color:var(--danger)">❌ 执行出错: ${data.error}</span>`;
                return;
            }

            const replyHtml = (typeof marked !== 'undefined' && data.reply) ? marked.parse(data.reply) : (data.reply || '');
            let html = `<div>${replyHtml}</div>`;

            if (data.actions && data.actions.length > 0) {
                // 过滤掉内部重试错误和系统消息（官方 AG 也不显示这些）
                const visibleActions = data.actions.filter(act => {
                    const atype = act.type || '';
                    const content = act.content || '';
                    if (atype === 'error' && content.toLowerCase().includes('retryable')) return false;
                    if (atype === 'ephemeral_message') return false;
                    return true;
                });
                if (visibleActions.length > 0) {
                html += `
                <details class="action-tree-container">
                    <summary style="font-size: 13px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 6px;">
                        <span class="dropdown-arrow">▶</span> 查看详细执行过程 (${visibleActions.length}步)
                    </summary>
                    <div class="action-tree">
                `;
                visibleActions.forEach(act => {
                    let icon = '⚙️';
                    const atype = act.type || '';
                    if (atype === 'planner_response') icon = '🤖';
                    else if (atype === 'user_input') icon = '💬';
                    else if (atype === 'error') icon = '❌';
                    else if (atype.includes('code_action') || atype.includes('file_edit')) icon = '📝';
                    else if (atype.includes('run_command') || atype.includes('command')) icon = '📜';
                    else if (atype.includes('search') || atype.includes('grep') || atype.includes('find')) icon = '🔍';
                    else if (atype.includes('list_dir') || atype.includes('directory')) icon = '📁';
                    else if (atype.includes('view_code') || atype.includes('view_file')) icon = '👁️';
                    else if (atype.includes('task_boundary')) icon = '📌';
                    else if (atype.includes('checkpoint')) icon = '💾';

                    const label = act.content || atype;
                    const shortLabel = label.length > 40 ? label.slice(0, 40) + '…' : label;
                    html += `
                        <div class="action-node">
                            <div class="action-card clickable">
                                <div><span class="action-icon">${icon}</span> <b>${atype}</b></div>
                                <span style="color:var(--text-muted); font-size:12px; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${label}">${shortLabel}</span>
                            </div>
                        </div>
                    `;
                });
                html += `</div></details>`;
                html += `<div style="margin-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; font-size: 14px; color: var(--success);">✅ 执行完毕，耗时 ${data.elapsed} 秒</div>`;
                } // end if visibleActions.length
            }

            bubble.innerHTML = html;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        inputStr.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        // Init
        window.onload = () => {
            fetchInstances();
        };

    </script>

    <!-- Image Viewer Overlay -->
    <div id="imgViewerOverlay">
        <img id="imgViewerImg" />
        <div id="imgViewerClose" onclick="closeImageViewer()">✕</div>
        <div id="imgViewerInfo"></div>
    </div>

    <script>
    // ===== 图片全屏查看器（支持双指缩放 + 拖拽平移 + 双击复位 + 智能旋转）=====
    (function() {
        const overlay = document.getElementById('imgViewerOverlay');
        const viewImg = document.getElementById('imgViewerImg');
        const infoLabel = document.getElementById('imgViewerInfo');

        let scale = 1, panX = 0, panY = 0, rotation = 0;
        let imgW = 0, imgH = 0;
        let isDragging = false, dragMoved = false, lastX = 0, lastY = 0;
        let lastPinchDist = 0, lastTap = 0;

        function updateTransform() {
            viewImg.style.transform = `translate(${panX}px, ${panY}px) scale(${scale}) rotate(${rotation}deg)`;
            infoLabel.textContent = `${imgW} \u00d7 ${imgH}  |  ${Math.round(scale * 100)}%${rotation ? '  \u21bb' : ''}`;
        }

        function fitToScreen() {
            const vw = window.innerWidth, vh = window.innerHeight;
            const isLandscapeImg = imgW > imgH;
            const isPortraitView = vh > vw;
            panX = 0; panY = 0;

            if (isLandscapeImg && isPortraitView && imgW / imgH > 1.2) {
                rotation = 90;
                scale = Math.min(vw / imgH, vh / imgW, 1);
            } else {
                rotation = 0;
                scale = Math.min(vw / imgW, vh / imgH, 1);
            }
            viewImg.style.width = imgW + 'px';
            viewImg.style.height = imgH + 'px';
            updateTransform();
        }

        window.openImageViewer = function(src) {
            if (!src || !src.startsWith('data:image')) return;
            overlay.classList.add('active');
            viewImg.onload = function() {
                imgW = viewImg.naturalWidth;
                imgH = viewImg.naturalHeight;
                fitToScreen();
            };
            viewImg.src = src;
            document.body.style.overflow = 'hidden';
        };

        window.closeImageViewer = function() {
            overlay.classList.remove('active');
            viewImg.src = '';
            rotation = 0; panX = 0; panY = 0; scale = 1;
            document.body.style.overflow = '';
        };

        // 滚轮缩放
        overlay.addEventListener('wheel', function(e) {
            e.preventDefault();
            const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
            scale = Math.max(0.05, Math.min(scale * factor, 30));
            updateTransform();
        }, { passive: false });

        // 触摸事件
        overlay.addEventListener('touchstart', function(e) {
            if (e.target.id === 'imgViewerClose') return;
            e.preventDefault();
            if (e.touches.length === 1) {
                const now = Date.now();
                if (now - lastTap < 300) {
                    if (rotation) { rotation = 0; }
                    panX = 0; panY = 0;
                    fitToScreen();
                    lastTap = 0; return;
                }
                lastTap = now;
                isDragging = true; dragMoved = false;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                lastPinchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY);
            }
        }, { passive: false });

        overlay.addEventListener('touchmove', function(e) {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                panX += e.touches[0].clientX - lastX;
                panY += e.touches[0].clientY - lastY;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
                dragMoved = true;
                updateTransform();
            } else if (e.touches.length === 2) {
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY);
                if (lastPinchDist > 0) {
                    scale = Math.max(0.05, Math.min(scale * (dist / lastPinchDist), 30));
                    updateTransform();
                }
                lastPinchDist = dist;
            }
        }, { passive: false });

        overlay.addEventListener('touchend', function() { isDragging = false; lastPinchDist = 0; });

        // 鼠标拖拽
        overlay.addEventListener('mousedown', function(e) {
            if (e.target.id === 'imgViewerClose') return;
            isDragging = true; dragMoved = false;
            lastX = e.clientX; lastY = e.clientY;
            overlay.style.cursor = 'grabbing';
        });
        overlay.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            panX += e.clientX - lastX; panY += e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            dragMoved = true;
            updateTransform();
        });
        overlay.addEventListener('mouseup', function() { isDragging = false; overlay.style.cursor = ''; });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && overlay.classList.contains('active')) closeImageViewer();
        });
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay && !dragMoved) closeImageViewer();
        });
    })();
    </script>
